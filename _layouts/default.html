<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>
      {%- if page.title -%}
        {{ page.title | escape }} | {{ site.title | escape }}
      {%- else -%}
        {{ site.title | escape }}
      {%- endif -%}
    </title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
    <link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }}" href="{{ '/feed.xml' | absolute_url }}">
    <script>
      (function () {
        var savedTheme = localStorage.getItem("theme");
        if (savedTheme === "light" || savedTheme === "dark") {
          document.documentElement.dataset.theme = savedTheme;
        }
      }());
    </script>
  </head>
  <body>
    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        <button class="theme-toggle" type="button" role="switch" aria-label="Toggle dark mode" aria-checked="false">
          <span class="theme-toggle__track" aria-hidden="true">
            <span class="theme-toggle__star theme-toggle__star--1"></span>
            <span class="theme-toggle__star theme-toggle__star--2"></span>
            <span class="theme-toggle__star theme-toggle__star--3"></span>
            <span class="theme-toggle__thumb">
              <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
              </svg>
              <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
              </svg>
            </span>
          </span>
        </button>
        {{ content }}
      </div>
    </main>
    <script src="{{ '/assets/theme.js' | relative_url }}"></script>
  </body>
</html>
